side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ecocraft_api"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"
